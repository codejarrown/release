  /api/{sessionId}/ws:
    get:
      tags: [WebSocket]
      summary: 实时事件推送（WebSocket）
      operationId: websocket
      description: |
        通过 WebSocket 长连接接收实时事件推送。

        ### 连接方式
        ```
        ws://{host}/api/{sessionId}/ws
        ```

        ### 前置条件
        1. 先通过 Connect 端点创建会话，获得 `sessionId`
        2. 通过 `/subscriptions/subscribe` 订阅需要的品种

        ### 推送消息格式
        所有推送消息均为 JSON，包含 `type` 和 `data` 两个字段。

        ---

        #### 连接生命周期事件

        **connected** — WebSocket 连接建立成功后立即推送
        ```json
        {
          "type": "connected",
          "data": {
            "sessionId": "abc-123",
            "connectedAt": "2026-03-05T12:00:00Z",
            "server": "connected"
          }
        }
        ```

        **disconnected** — MT5 会话断开时推送
        ```json
        {
          "type": "disconnected",
          "data": {
            "reason": "mt5_session_lost",
            "timestamp": "2026-03-05T12:05:00Z"
          }
        }
        ```

        **error** — 发生异常时推送
        ```json
        {
          "type": "error",
          "data": {
            "message": "error description",
            "timestamp": "2026-03-05T12:05:00Z"
          }
        }
        ```

        **connectProgress** — MT5 连接过程中的进度更新
        ```json
        {
          "type": "connectProgress",
          "data": { ... }
        }
        ```

        ---

        #### 行情事件

        **quote** — 实时报价（需先订阅品种）
        ```json
        {
          "type": "quote",
          "data": {
            "symbol": "EURUSD",
            "bid": 1.0856,
            "ask": 1.0858,
            "time": "2026-03-05T12:00:00",
            "last": 0,
            "volume": 0
          }
        }
        ```

        **quoteHistory** — K 线历史数据下载完成
        ```json
        {
          "type": "quoteHistory",
          "data": { ... }
        }
        ```

        **tickHistory** — Tick 历史数据下载完成
        ```json
        {
          "type": "tickHistory",
          "data": { ... }
        }
        ```

        **orderBook** — 订单簿（市场深度）更新
        ```json
        {
          "type": "orderBook",
          "data": { ... }
        }
        ```

        ---

        #### 订单事件

        **orderUpdate** — 订单状态变更
        ```json
        {
          "type": "orderUpdate",
          "data": { ... }
        }
        ```

        **orderProgress** — 订单执行进度
        ```json
        {
          "type": "orderProgress",
          "data": { ... }
        }
        ```

        **orderHistory** — 订单历史下载完成
        ```json
        {
          "type": "orderHistory",
          "data": { ... }
        }
        ```

        ---

        #### 品种事件

        **symbolUpdate** — 品种信息更新
        ```json
        {
          "type": "symbolUpdate",
          "data": { ... }
        }
        ```

        **symbolsUpdate** — 品种列表更新
        ```json
        {
          "type": "symbolsUpdate",
          "data": {
            "timestamp": "2026-03-05T12:00:00Z"
          }
        }
        ```

        ---

        #### 其他事件

        **mail** — 站内邮件通知
        ```json
        {
          "type": "mail",
          "data": { ... }
        }
        ```
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "101":
          description: Switching Protocols — WebSocket 连接已建立
        "400":
          description: 非 WebSocket 请求
        "404":
          $ref: "#/components/responses/NotFound"

# ==========================================================================
components:
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
      description: 由 Connect 端点返回的会话 ID
    Symbol:
      name: symbol
      in: path
      required: true
      schema:
        type: string
      description: 品种名称（如 EURUSD）

  responses:
    Success:
      description: 操作成功
      content:
        application/json:
          schema:
            type: object
            required: [success]
            properties:
              success:
                type: boolean
                example: true
    Error:
      description: 服务端错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Timeout:
      description: 请求超时
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ----- Error -----
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          enum: [not_found, invalid_operation, timeout, bad_request, internal_error]
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    # ----- Enums -----
    OrderType:
      type: string
      enum: [Buy, Sell, BuyLimit, SellLimit, BuyStop, SellStop, BuyStopLimit, SellStopLimit, CloseBy]

    OrderSort:
      type: string
      enum: [OpenTime, CloseTime]

    DealType:
      type: string
      enum:
        - DealBuy
        - DealSell
        - Balance
        - Credit
        - Charge
        - Correction
        - Bonus
        - Commission
        - DailyCommission
        - MonthlyCommission
        - DailyAgentCommission
        - MonthlyAgentCommission
        - InterestRate
        - CanceledBuy
        - CanceledSell
        - Dividend
        - FrankedDividend
        - Tax
        - AgentCommission
        - SoCompensation
        - SoCreditCompensation

    FillPolicy:
      type: string
      enum: [FillOrKill, ImmediateOrCancel, FlashFill, Any]

    TradeType:
      type: string
      enum:
        - TradePrice
        - RequestExecution
        - InstantExecution
        - MarketExecution
        - ExchangeExecution
        - SetOrder
        - ModifyDeal
        - ModifyOrder
        - CancelOrder
        - Transfer
        - ClosePosition

    PlacedType:
      type: string
      enum: [Manually, ByExpert, ByDealer, OnSL, OnTP, OnStopOut, OnRollover, Mobile, Web, Signal, Settlement, Transfer]

    ExpirationType:
      type: string
      enum: [GTC, Today, Specified, SpecifiedDay]

    OrderState:
      type: string
      enum: [Started, Placed, Cancelled, Partial, Filled, Rejected, Expired, RequestAdding, RequestModifying, RequestCancelling]

    UpdateType:
      type: string
      enum:
        - Unknown
        - PendingClose
        - MarketOpen
        - PendingOpen
        - MarketClose
        - PartialClose
        - Started
        - Filled
        - Cancelling
        - MarketModify
        - PendingModify
        - OnStopLoss
        - OnTakeProfit
        - OnStopOut
        - Balance
        - Expired
        - Rejected
        - MarketCloseBy
        - PartialFill

    Direction:
      type: string
      enum: [In, Out, InOut, OutBy]

    # ----- Session DTOs -----
    ConnectByAddressRequest:
      type: object
      required: [user, password, host, port]
      properties:
        user:
          type: integer
          format: uint64
          description: MT5 账号
        password:
          type: string
        host:
          type: string
          description: 服务器 IP 或域名
        port:
          type: integer
        timeoutMs:
          type: integer
          default: 30000

    ConnectByServerRequest:
      type: object
      required: [user, password, serverName]
      properties:
        user:
          type: integer
          format: uint64
        password:
          type: string
        serverName:
          type: string
          description: 服务器名称（如 BrokerName-Live）
        timeoutMs:
          type: integer
          default: 30000

    ConnectResponse:
      type: object
      required: [sessionId, connected]
      properties:
        sessionId:
          type: string
        connected:
          type: boolean
        account:
          $ref: "#/components/schemas/AccountInfo"

    SessionInfoResponse:
      type: object
      required: [sessionId, connected]
      properties:
        sessionId:
          type: string
        connected:
          type: boolean
        account:
          $ref: "#/components/schemas/AccountInfo"
        server:
          type: string
        accountCurrency:
          type: string
        accountProfit:
          type: number
          format: double
        accountMargin:
          type: number
          format: double
        accountEquity:
          type: number
          format: double
        accountFreeMargin:
          type: number
          format: double
        marginLevel:
          type: number
          format: double
          description: 保证金水平 (%)
        isTradeAllowed:
          type: boolean
        isInvestor:
          type: boolean
        connectTime:
          type: string
          format: date-time

    SessionPingResponse:
      type: object
      required: [latencyMs, host, port]
      properties:
        latencyMs:
          type: integer
          description: TCP 建连耗时（毫秒）
        host:
          type: string
        port:
          type: integer

    SessionListResponse:
      type: object
      required: [activeCount, sessionIds]
      properties:
        activeCount:
          type: integer
        sessionIds:
          type: array
          items:
            type: string

    AccountInfo:
      type: object
      required: [login, userName, balance]
      properties:
        login:
          type: integer
          format: uint64
        userName:
          type: string
        balance:
          type: number
          format: double
        credit:
          type: number
          format: double
        leverage:
          type: integer
        country:
          type: string
        email:
          type: string

    ChangePasswordRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
        isInvestor:
          type: boolean
          default: false

    PingRequest:
      type: object
      required: [host]
      properties:
        host:
          type: string
        port:
          type: integer
          default: 443

    # ----- Market DTOs -----
    Quote:
      type: object
      required: [symbol, bid, ask, time]
      properties:
        symbol:
          type: string
        bid:
          type: number
          format: double
        ask:
          type: number
          format: double
        time:
          type: string
          format: date-time
        last:
          type: number
          format: double
        volume:
          type: integer
          format: uint64

    MarketWatch:
      type: object
      required: [symbol, bid, ask]
      properties:
        symbol:
          type: string
        high:
          type: number
          format: double
        low:
          type: number
          format: double
        openPrice:
          type: number
          format: double
        closePrice:
          type: number
          format: double
        dailyChange:
          type: number
          format: double
        bid:
          type: number
          format: double
        ask:
          type: number
          format: double
        spread:
          type: integer
        volume:
          type: integer
          format: uint64

