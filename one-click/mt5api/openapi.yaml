openapi: 3.0.3
info:
  title: MT5API Web Service
  description: |
    MetaTrader 5 交易 API 的 RESTful HTTP 封装。

    ## 认证模型
    采用 **会话制**：先调用 Connect 端点获得 `sessionId`，后续所有需要 MT5 连接的请求通过 URL 路径中的 `{sessionId}` 关联到对应的 MT5 实例。
    会话默认 30 分钟无访问自动过期（可配置）。

    ## 枚举值
    所有枚举均以 **字符串** 形式传输（JSON 序列化时使用 `JsonStringEnumConverter`）。
  version: 1.0.0
  license:
    name: Private

servers:
  - url: http://localhost:5050
    description: Local Docker

tags:
  - name: Health
  - name: Session
    description: 连接/断开/会话管理
  - name: Market
    description: 行情报价、品种信息、服务器时间
  - name: Subscriptions
    description: 行情订阅/取消订阅
  - name: Trading
    description: 下单、平仓、改单、持仓查询
  - name: Calculations
    description: 保证金、盈亏计算
  - name: History
    description: 订单历史、K 线历史、Tick 历史
  - name: Mail
    description: 站内邮件
  - name: Utilities
    description: 工具类接口（无需会话）
  - name: WebSocket
    description: |
      实时事件推送（WebSocket 长连接）。
      连接后自动推送已订阅品种的报价、订单更新、订单执行进度。

paths:
  # ===== Health =====
  /health:
    get:
      tags: [Health]
      summary: 健康检查
      operationId: healthCheck
      responses:
        "200":
          description: 服务正常
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time

  # ===== Session =====
  /api/session/connect/address:
    post:
      tags: [Session]
      summary: 通过 IP:Port 连接 MT5
      operationId: connectByAddress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectByAddressRequest"
      responses:
        "200":
          description: 连接成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectResponse"
        "500":
          $ref: "#/components/responses/Error"

  /api/session/connect/server:
    post:
      tags: [Session]
      summary: 通过服务器名称连接 MT5
      operationId: connectByServer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectByServerRequest"
      responses:
        "200":
          description: 连接成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectResponse"
        "500":
          $ref: "#/components/responses/Error"

  /api/session/:
    get:
      tags: [Session]
      summary: 列出所有活跃会话
      operationId: listSessions
      responses:
        "200":
          description: 会话列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResponse"

  /api/session/{sessionId}:
    get:
      tags: [Session]
      summary: 获取会话详细信息
      operationId: getSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: 会话详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfoResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Session]
      summary: 断开连接并销毁会话
      operationId: disconnectSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: 断开成功
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/ping:
    get:
      tags: [Session]
      summary: 测量当前会话到券商主机端口的延迟
      description: 使用会话当前连接解析到的 Host/Port 执行 TCP 建连耗时测量，算法与 POST /api/utils/ping 一致。
      operationId: getSessionPing
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: 当前会话延迟
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionPingResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/session/{sessionId}/password:
    post:
      tags: [Session]
      summary: 修改密码
      operationId: changePassword
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===== Market =====
  /api/{sessionId}/market/quote/{symbol}:
    get:
      tags: [Market]
      summary: 获取实时报价（异步）
      operationId: getQuote
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/Symbol"
        - name: timeoutMs
          in: query
          schema:
            type: integer
          description: 超时毫秒数
      responses:
        "200":
          description: 报价
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "404":
          $ref: "#/components/responses/NotFound"
        "504":
          $ref: "#/components/responses/Timeout"

  /api/{sessionId}/market/quote/{symbol}/sync:
    get:
      tags: [Market]
      summary: 获取实时报价（同步）
      operationId: getQuoteSync
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/Symbol"
        - name: timeoutMs
          in: query
          schema:
            type: integer
        - name: msNotOlder
          in: query
          schema:
            type: integer
          description: 仅返回不超过该毫秒数前的报价
      responses:
        "200":
          description: 报价
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/market/watch/{symbol}:
    get:
      tags: [Market]
      summary: 获取 MarketWatch 数据
      operationId: getMarketWatch
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/Symbol"
      responses:
        "200":
          description: MarketWatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketWatch"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/market/symbols:
    get:
      tags: [Market]
      summary: 获取所有品种名
      operationId: getSymbolNames
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: 品种名列表
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/market/symbols/{symbol}/info:
    get:
      tags: [Market]
      summary: 获取品种详细信息
      operationId: getSymbolInfo
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/Symbol"
      responses:
        "200":
          description: 品种信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SymbolInfo"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/market/symbols/{symbol}/group:
    get:
      tags: [Market]
      summary: 获取品种交易组信息
      operationId: getSymbolGroup
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/Symbol"
      responses:
        "200":
          description: 交易组信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SymGroup"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/market/symbols/{symbol}/exists:
    get:
      tags: [Market]
      summary: 检查品种是否存在
      operationId: symbolExists
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/Symbol"
      responses:
        "200":
          description: 是否存在
          content:
            application/json:
              schema:
                type: object
                required: [exists]
                properties:
                  exists:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/market/symbols/{symbol}/contractSize:
    get:
      tags: [Market]
      summary: 获取合约大小
      operationId: getContractSize
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/Symbol"
      responses:
        "200":
          description: 合约大小
          content:
            application/json:
              schema:
                type: object
                required: [contractSize]
                properties:
                  contractSize:
                    type: number
                    format: double
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/market/symbols/{symbol}/tickSize:
    get:
      tags: [Market]
      summary: 获取最小变动价位
      operationId: getTickSize
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/Symbol"
      responses:
        "200":
          description: Tick Size
          content:
            application/json:
              schema:
                type: object
                required: [tickSize]
                properties:
                  tickSize:
                    type: number
                    format: double
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/market/symbols/{symbol}/tickValue:
    get:
      tags: [Market]
      summary: 获取每点价值
      operationId: getTickValue
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/Symbol"
        - name: timeoutMs
          in: query
          schema:
            type: integer
            default: 10000
      responses:
        "200":
          description: Tick Value
          content:
            application/json:
              schema:
                type: object
                required: [tickValue]
                properties:
                  tickValue:
                    type: number
                    format: double
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/market/symbols/{symbol}/sessions/quote:
    get:
      tags: [Market]
      summary: 当前是否在报价交易时段
      operationId: isQuoteSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/Symbol"
      responses:
        "200":
          description: 结果
          content:
            application/json:
              schema:
                type: object
                required: [isQuoteSession]
                properties:
                  isQuoteSession:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/market/symbols/{symbol}/sessions/trade:
    get:
      tags: [Market]
      summary: 当前是否在交易时段
      operationId: isTradeSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/Symbol"
      responses:
        "200":
          description: 结果
          content:
            application/json:
              schema:
                type: object
                required: [isTradeSession]
                properties:
                  isTradeSession:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/market/serverTime:
    get:
      tags: [Market]
      summary: 获取服务器时间
      operationId: getServerTime
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: 服务器时间
          content:
            application/json:
              schema:
                type: object
                required: [serverTime]
                properties:
                  serverTime:
                    type: string
                    format: date-time
                  timeZoneMinutes:
                    type: integer
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/market/cluster:
    get:
      tags: [Market]
      summary: 获取集群详情
      operationId: getClusterDetails
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: 集群信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterDetails"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===== Subscriptions =====
  /api/{sessionId}/subscriptions/subscribe:
    post:
      tags: [Subscriptions]
      summary: 订阅单个品种
      operationId: subscribe
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeRequest"
      responses:
        "200":
          description: 订阅成功
          content:
            application/json:
              schema:
                type: object
                required: [subscribed, symbol]
                properties:
                  subscribed:
                    type: boolean
                  symbol:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/subscriptions/subscribe/multiple:
    post:
      tags: [Subscriptions]
      summary: 批量订阅
      operationId: subscribeMultiple
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeMultipleRequest"
      responses:
        "200":
          description: 订阅成功
          content:
            application/json:
              schema:
                type: object
                required: [subscribed, symbols]
                properties:
                  subscribed:
                    type: boolean
                  symbols:
                    type: array
                    items:
                      type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/subscriptions/subscribe/force:
    post:
      tags: [Subscriptions]
      summary: 强制重新订阅
      operationId: subscribeForce
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeMultipleRequest"
      responses:
        "200":
          description: 订阅成功
          content:
            application/json:
              schema:
                type: object
                required: [subscribed, symbols]
                properties:
                  subscribed:
                    type: boolean
                  symbols:
                    type: array
                    items:
                      type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/subscriptions/unsubscribe:
    post:
      tags: [Subscriptions]
      summary: 取消订阅单个品种
      operationId: unsubscribe
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeRequest"
      responses:
        "200":
          description: 取消成功
          content:
            application/json:
              schema:
                type: object
                required: [unsubscribed, symbol]
                properties:
                  unsubscribed:
                    type: boolean
                  symbol:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/subscriptions/unsubscribe/multiple:
    post:
      tags: [Subscriptions]
      summary: 批量取消订阅
      operationId: unsubscribeMultiple
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeMultipleRequest"
      responses:
        "200":
          description: 取消成功
          content:
            application/json:
              schema:
                type: object
                required: [unsubscribed, symbols]
                properties:
                  unsubscribed:
                    type: boolean
                  symbols:
                    type: array
                    items:
                      type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/subscriptions/:
    get:
      tags: [Subscriptions]
      summary: 获取当前订阅列表
      operationId: getSubscriptions
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: 订阅列表
          content:
            application/json:
              schema:
                type: object
                required: [subscriptions]
                properties:
                  subscriptions:
                    type: array
                    items:
                      type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/subscriptions/isSubscribed/{symbol}:
    get:
      tags: [Subscriptions]
      summary: 检查是否已订阅
      operationId: isSubscribed
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/Symbol"
      responses:
        "200":
          description: 结果
          content:
            application/json:
              schema:
                type: object
                required: [isSubscribed]
                properties:
                  isSubscribed:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/subscriptions/orderBook/subscribe:
    post:
      tags: [Subscriptions]
      summary: 订阅订单簿
      operationId: subscribeOrderBook
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeRequest"
      responses:
        "200":
          description: 订阅成功
          content:
            application/json:
              schema:
                type: object
                required: [subscribed, symbol]
                properties:
                  subscribed:
                    type: boolean
                  symbol:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/subscriptions/orderBook/unsubscribe:
    post:
      tags: [Subscriptions]
      summary: 取消订阅订单簿
      operationId: unsubscribeOrderBook
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeRequest"
      responses:
        "200":
          description: 取消成功
          content:
            application/json:
              schema:
                type: object
                required: [unsubscribed, symbol]
                properties:
                  unsubscribed:
                    type: boolean
                  symbol:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  # ===== Trading =====
  /api/{sessionId}/trading/orders/send:
    post:
      tags: [Trading]
      summary: 发送订单（市价单/挂单）
      operationId: orderSend
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderSendRequest"
      responses:
        "200":
          description: 下单成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/Error"

  /api/{sessionId}/trading/orders/close:
    post:
      tags: [Trading]
      summary: 平仓 / 撤单
      operationId: orderClose
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCloseRequest"
      responses:
        "200":
          description: 平仓成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/Error"

  /api/{sessionId}/trading/orders/modify:
    post:
      tags: [Trading]
      summary: 修改订单
      operationId: orderModify
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderModifyRequest"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/Error"

  /api/{sessionId}/trading/orders/opened:
    get:
      tags: [Trading]
      summary: 获取所有持仓/挂单
      operationId: getOpenedOrders
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: sort
          in: query
          schema:
            $ref: "#/components/schemas/OrderSort"
        - name: ascending
          in: query
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: 持仓列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/trading/orders/opened/{ticket}:
    get:
      tags: [Trading]
      summary: 获取单个持仓
      operationId: getOpenedOrder
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: ticket
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 订单详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/trading/orders/closed:
    get:
      tags: [Trading]
      summary: 获取已平仓订单
      operationId: getClosedOrders
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: 已平仓列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===== Calculations =====
  /api/{sessionId}/calc/requiredMargin:
    post:
      tags: [Calculations]
      summary: 计算所需保证金
      operationId: calcRequiredMargin
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequiredMarginRequest"
      responses:
        "200":
          description: 保证金结果
          content:
            application/json:
              schema:
                type: object
                required: [requiredMargin]
                properties:
                  requiredMargin:
                    type: number
                    format: double
        "404":
          $ref: "#/components/responses/NotFound"

  /api/{sessionId}/calc/orderProfit:
    post:
      tags: [Calculations]
      summary: 计算订单盈亏
      operationId: calcOrderProfit
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateOrderProfitRequest"
      responses:
        "200":
          description: 盈亏结果
          content:
            application/json:
              schema:
                type: object
                required: [profit]
                properties:
                  profit:
                    type: number
                    format: double
        "404":
